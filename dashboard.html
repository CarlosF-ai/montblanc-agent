<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏔️ Booking AI PRO</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  margin:30px;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.good { border-left:6px solid green; }
.mid { border-left:6px solid orange; }
.bad { border-left:6px solid red; }

h1 { color:#1a3d5c; }
</style>
</head>

<body>

<h1>🏔️ Booking AI PRO — Mont-Blanc</h1>

<div id="list"></div>

<script>
fetch("offers.csv")
.then(r => r.text())
.then(data => {

  const rows = data.trim().split("\n").slice(1);

  const container = document.getElementById("list");

  rows.forEach(r => {

    const c = r.split(",");

    const score = c[3];

    let cls = "bad";
    if (score.includes("EXCELLENTE")) cls = "good";
    else if (score.includes("BONNE")) cls = "mid";

    const div = document.createElement("div");
    div.className = "card " + cls;

    div.innerHTML = `
      <h3>${c[0]}</h3>
      <p>💰 Prix: ${c[2]}</p>
      <p>🍽️ Pension: ${c[3]}</p>
      <p>⭐ Score: ${c[3]}</p>
      <a href="${c[1]}" target="_blank">Voir l'offre</a>
    `;

    container.appendChild(div);
  });

});
</script>

</body>
</html>
