<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Mont-Blanc</title>

  <style>
    body {
      font-family: Arial;
      margin: 30px;
      background: #f5f5f5;
    }

    h1 {
      color: #1a3d5c;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #1a3d5c;
      color: white;
    }

    .good {
      background: #d4edda;
    }
  </style>
</head>

<body>

<h1>🏔️ Dashboard Mont-Blanc - Prix vacances</h1>

<table id="table">
  <thead>
    <tr>
      <th>Site</th>
      <th>Prix (€)</th>
      <th>Date</th>
      <th>Score</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
fetch('offres.csv')
.then(r => r.text())
.then(text => {

  const rows = text.trim().split("\n").slice(1);

  const tbody = document.querySelector("tbody");

  rows.forEach(r => {
    const cols = r.split(",");

    const prix = parseInt(cols[1]);

    const tr = document.createElement("tr");

    if (prix < 2000) tr.classList.add("good");

    tr.innerHTML = `
      <td>${cols[0]}</td>
      <td>${cols[1]}</td>
      <td>${cols[2]}</td>
      <td>${prix < 2000 ? "⭐⭐⭐" : "⭐⭐"}</td>
    `;

    tbody.appendChild(tr);
  });

});
</script>

</body>
</html>
